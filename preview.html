<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ethos Watches - Preview</title>
  <style>
    body{font-family:Inter,system-ui,Arial,sans-serif;margin:0;color:#111}
    .site-header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px}
    .logo{font-weight:700}
    .nav a{margin-left:18px}
    .hero{background:#f5f5f5;padding:80px 20px;text-align:center}
    .hero h1{font-size:40px;margin:0 0 10px}
    .cta{margin-top:16px;padding:12px 20px;border:0;background:#111;color:#fff}
    .products{padding:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
    .card{border:1px solid #eee;padding:12px;border-radius:6px;text-align:center}
    .card .img{height:180px;display:flex;align-items:center;justify-content:center}
    .card img{max-width:100%;max-height:100%}
    footer{border-top:1px solid #eee;padding:20px;text-align:center;margin-top:40px}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="logo">ETHOS WATCHES</div>
    <nav class="nav">
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Curated Luxury Watches</h1>
      <p>Limited editions, responsibly sourced.</p>
      <button class="cta">Shop Collection</button>
    </section>

    <section class="products">
      <h2>Featured</h2>
      <div class="grid">
        <div class="card"><div class="img"><img src="public/placeholder.png" alt=""></div><h3>Heritage Silver</h3><div>$1,250</div></div>
        <div class="card"><div class="img"><img src="public/placeholder.png" alt=""></div><h3>Aviator Black</h3><div>$980</div></div>
        <div class="card"><div class="img"><img src="public/placeholder.png" alt=""></div><h3>Ocean Blue</h3><div>$1,100</div></div>
        <div class="card"><div class="img"><img src="public/placeholder.png" alt=""></div><h3>Classic Gold</h3><div>$1,450</div></div>
      </div>
    </section>
  </main>

  <footer>© 2026 Ethos Watches - demo</footer>

</body>
</html>
